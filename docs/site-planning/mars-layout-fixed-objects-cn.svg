    <path d="M870 234H1530M870 298H1530M870 362H1530M870 426H1530M870 490H1530M870 554H1530"/>
    <path d="M936 170V600M1002 170V600M1068 170V600M1134 170V600M1200 170V600M1266 170V600M1332 170V600M1398 170V600M1464 170V600"/>
  </g>
