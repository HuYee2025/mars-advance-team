<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">火星固定物体精确坐标图</title>
  <desc id="desc">按游戏内实际 X/Z 坐标标注现有固定物体，并区分正面基地半球与背面黑暗半球。</desc>
  <style>
    svg { background: #080808; color: #f7f0e5; font-family: Inter, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .panel { fill: #11100f; stroke: rgba(246,189,117,0.38); stroke-width: 1.2; }
    .grid { stroke: rgba(255,255,255,0.08); stroke-width: 1; }
    .axis { stroke: rgba(246,189,117,0.38); stroke-width: 1.2; }
    .heading { fill: #f7f0e5; font-size: 24px; font-weight: 900; }
    .subhead { fill: #b9afa2; font-size: 14px; }
    .legend text, .tick { fill: #9f9588; font-size: 12px; }
    .label { fill: #f7f0e5; font-size: 12px; font-weight: 800; paint-order: stroke; stroke: #080808; stroke-width: 4px; stroke-linejoin: round; }
    .coord { fill: #cfc5b8; font-size: 12px; paint-order: stroke; stroke: #080808; stroke-width: 4px; stroke-linejoin: round; }
    .table-title { fill: #f6bd75; font-size: 16px; font-weight: 900; }
    .table-head { fill: #9f9588; font-size: 12px; font-weight: 800; }
    .table-text { fill: #e8ded1; font-size: 13px; }
    .table-muted { fill: #a99f91; font-size: 13px; }
    .rowline { stroke: rgba(255,255,255,0.07); stroke-width: 1; }
    circle { stroke: rgba(255,245,225,0.9); stroke-width: 1.4; }
    .base circle { fill: #79d7f2; }
    .energy circle { fill: #d8c85c; }
    .ship circle { fill: #e6b06b; }
    .spawn circle { fill: #ff4e3a; }
    .unknown circle { fill: #ffd95a; }
    .mystery circle { fill: #111315; stroke: #e8e0d2; }
    .candidate circle { fill: #8f8f88; stroke: #ffffff; stroke-width: 2.2; }
  </style>

  <text class="heading" x="70" y="46">火星固定物体精确坐标图</text>
  <text class="subhead" x="70" y="72">坐标为游戏内投影坐标 X/Z；正面与背面必须分开看，因为同一组 X/Z 在球体两侧可能对应不同半球。</text>

  <text class="heading" x="70" y="120">正面 / 基地半球</text>
  <text class="subhead" x="70" y="146">当前主基地、三艘飞船、太阳能阵列、黑色方碑所在半球</text>
  <rect class="panel" x="70" y="170" width="660" height="430" rx="4"/>

  <text class="heading" x="870" y="120">背面 / 黑暗半球</text>
  <text class="subhead" x="870" y="146">坠毁飞船、福福救援点、远古巨树拱门候选点所在半球</text>
  <rect class="panel" x="870" y="170" width="660" height="430" rx="4"/>

